name: Download YouTube to WAV

on:
  workflow_dispatch:
    inputs:
      urls:
        description: |
          YouTube URL（1行に1つ）
          例:
          https://youtu.be/xxxxxxxxxxx
          https://www.youtube.com/watch?v=xxxxxxxxxxx
        required: true
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Deno
        uses: denoland/setup-deno@v2

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Prepare YouTube cookies
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          if [ -n "$YOUTUBE_COOKIES" ]; then
            printf '%s' "$YOUTUBE_COOKIES" > cookies.txt
            echo "YouTube cookies file created."
          else
            echo "::warning::YOUTUBE_COOKIES secret is not set. YouTube may block downloads from GitHub Actions."
          fi

      - name: Download and convert to WAV
        env:
          URLS: ${{ inputs.urls }}
        run: |
          COOKIE_ARG=()
          if [ -f cookies.txt ]; then
            COOKIE_ARG=(--cookies cookies.txt)
          fi
          printf '%s\n' "$URLS" | python download_to_wav.py --stdin "${COOKIE_ARG[@]}"

      - name: Upload WAV artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wav-${{ github.run_number }}
          path: wav/
          if-no-files-found: warn
